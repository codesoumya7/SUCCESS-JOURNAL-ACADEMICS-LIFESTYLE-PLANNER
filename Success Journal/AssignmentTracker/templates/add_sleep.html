<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Sleep Record</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <h1>Add New Sleep Record</h1>

    <form method="POST">
        <label for="date">Date:</label>
        <input type="date" id="date" name="date" required><br><br>

        <label for="sleep_hours">Sleep Hours:</label>
        <input type="number" id="sleep_hours" name="sleep_hours" required><br><br>

        <label for="sleep_quality">Sleep Quality:</label>
        <select id="sleep_quality" name="sleep_quality" required>
            <option value="Good">Good</option>
            <option value="Fair">Fair</option>
            <option value="Poor">Poor</option>
        </select><br><br>

        <button type="submit">Add Sleep Record</button>
    </form>

    <a href="/lifestyle/sleep_tracker"><button>Back to Sleep Tracker</button></a>
</body>
</html>
