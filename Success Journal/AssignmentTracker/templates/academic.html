<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Tracker</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="academic">
    <h1>Assignment Tracker</h1>

    <!-- Button container for alignment -->
    <div class="button-container">
        <a href="/"><button>Back to Home</button></a>
        <a href="/academic/add_assignment"><button>Add New Assignment</button></a>
    </div>

    <!-- Table for displaying assignments -->
    <table>
        <thead>
            <tr>
                
                <th>Title</th>
                <th>Description</th>
                <th>Due Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for assignment in assignments %}
                <tr>
                    
                    <td>{{ assignment.title }}</td>
                    <td>{{ assignment.description }}</td>
                    <td>{{ assignment.due_date }}</td>
                    <td>
                        <a href="/academic/edit_assignment/{{ assignment.id }}"><button>Edit</button></a>
                        <a href="/academic/delete_assignment/{{ assignment.id }}"><button>Delete</button></a>
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
