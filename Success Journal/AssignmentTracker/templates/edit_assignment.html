<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Assignment</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="edit_assignment">
    <h1>Edit Assignment</h1>
       <form method="POST">
    <label for="title">Title:</label>
    <input type="text" id="title" name="title" value="{{ assignment['title'] }}" required><br><br>

    <label for="description">Description:</label>
    <textarea id="description" name="description">{{ assignment['description'] }}</textarea><br><br>

    <label for="due_date">Due Date:</label>
    <input type="date" id="due_date" name="due_date" value="{{ assignment['due_date'] }}" required><br><br>

    <button type="submit" class="button">Update Assignment</button>
    
    <a href="/academic/assignments"><button>Back to Assignment Tracker</button></a>
    </form>

</body>
