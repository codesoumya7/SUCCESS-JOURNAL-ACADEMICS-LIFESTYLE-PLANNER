<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Water Intake</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="add_water">
    <h1>Add Water Intake</h1>
    <form method="POST">
        <label for="date">Date:</label>
        <input type="date" id="date" name="date" required><br><br>

        <label for="amount">Amount (L):</label>
        <input type="number" id="amount" name="amount" min="1" required><br><br>

        <button type="submit">Add Water Intake</button>
    </form>
    <a href="/lifestyle/water_tracker"><button>Back to Water Tracker</button></a>
</body>
</html>
