    <button id="chatbot-btn">Chat with Us</button>

        const chatbotBtn = document.getElementById("chatbot-btn");
        const chatbotContainer = document.getElementById("chatbot-container");
        const chatBody = document.getElementById("chat-body");
        const userInput = document.getElementById("user-input");

        // Toggle chatbot visibility
        chatbotBtn.addEventListener("click", () => {
            chatbotContainer.style.display = chatbotContainer.style.display === "none" ? "flex" : "none";

            const messageDiv = document.createElement("div");

            chatBody.scrollTop = chatBody.scrollHeight;  // Auto-scroll

            const message = userInput.value.trim();

                    method: "POST",

                    body: JSON.stringify({ message }),

                const reply = data.reply || "I'm sorry, something went wrong.";

                appendMessage(reply, "bot");
            } catch (error) {
                appendMessage("Error connecting to the server.", "bot");
            }
        }
    </script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="chatbot.css">
    <title>Chatbot</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url("https://i.pinimg.com/736x/e7/5d/ed/e75dedfe63174ef77303bc17be07f1aa.jpg");
            background-size: cover;
            background-position:left;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.2); /* Adjust the alpha value for desired lightness */
            z-index: -1; /
        }
        .chat-container {
            width: 700px;
            height: 550px;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background-color:  #33445b;
            color: white;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
        }
        .chat-messages {
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
            max-height: 400px;
            background-color: #f9f9f9;
        }
        .chat-messages div {
            margin-bottom: 12px;
            max-width: 70%;
            padding: 10px;
            border-radius: 20px;
        }
        .user-message {
            background-color: #d1f5d3;
            text-align: right;
            margin-left: auto;
        }
        .bot-message {
            background-color: #f1f1f1;
            text-align: left;
            margin-right: auto;
        }
        .chat-input-container {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
            background-color: #fff;
        }
        .chat-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            font-size: 16px;
        }
        .chat-send {
            background-color:  #33445b;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-left: 10px;
            border-radius: 20px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .chat-send:hover {
            background-color:#101721;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">Chatbot</div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-container">
            <input type="text" id="user-input" class="chat-input" placeholder="Type your message here...">
            <button id="send-button" class="chat-send">Send</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');

        function addMessage(message, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = sender === 'user' ? 'user-message' : 'bot-message';
            messageDiv.textContent = message;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight; // Auto-scroll
        }

        sendButton.addEventListener('click', () => {
            const message = userInput.value.trim();
            if (!message) return;
            addMessage(message, 'user');
            userInput.value = '';

            fetch('/get_response', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `message=${encodeURIComponent(message)}`
            })
            .then(response => response.json())
            .then(data => {
                addMessage(data.response, 'bot');
            })
            .catch(error => {
                console.error('Error:', error);
                addMessage('Sorry, an error occurred.', 'bot');
            });
        });

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendButton.click();
            }
        });
    </script>
</body>
</html>
