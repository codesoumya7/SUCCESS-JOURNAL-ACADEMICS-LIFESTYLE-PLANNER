<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Assignment</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <form method="POST">
        <label for="date">Date:</label>
        <input type="date" id="date" name="date" value="{{ water_entry['date'] }}" required><br><br>
    
        <label for="amount">Amount (L):</label>
        <input type="number" id="amount" name="amount" value="{{ water_entry['amount'] }}" min="1" required><br><br>
    
        <button type="submit">Update Water Intake</button>
        <a href="/lifestyle/water_tracker"><button>Back to Water Tracker</button></a>
    </form>
    
</body>
