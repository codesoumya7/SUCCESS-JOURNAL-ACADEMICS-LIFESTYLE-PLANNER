<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Workout</title>
    <link rel="stylesheet" href="/static/css/styles.css"> <!-- Link to your CSS -->
</head>
<body>
    <header>
        <h1>Edit Workout</h1>
    </header>
    <main>
        <form method="POST">
            <div class="form-group">
                <label for="date">Date:</label>
                <input type="date" id="date" name="date" value="{{ exercise['date'] }}" required>
            </div>
            <div class="form-group">
                <label for="workout">Workout:</label>
                <input type="text" id="workout" name="workout" value="{{ exercise['workout'] }}" required>
            </div>
            <div class="form-group">
                <label for="duration">Duration (in minutes):</label>
                <input type="number" id="duration" name="duration" value="{{ exercise['duration'] }}" required>
            </div>
            <div class="form-group">
                <label for="notes">Notes:</label>
                <textarea id="notes" name="notes">{{ exercise['notes'] }}</textarea>
            </div>
            <button type="submit">Update Workout</button>
            <a href="/lifestyle/exercise_tracker">
                <button type="button">Cancel</button>
            </a>
        </form>
    </main>
</body>
</html>
