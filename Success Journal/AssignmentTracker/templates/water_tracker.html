<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Intake Tracker</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="lifestyle">
    <h1>Water Intake Tracker</h1>

    <!-- Button container for alignment -->
    <div class="button-container">
        <a href="/"><button>Back to Home</button></a>
        <a href="/lifestyle/add_water"><button>Add Water Intake</button></a>
    </div>

    <!-- Table for displaying water intake records -->
    <table>
        <thead>
            <tr>
                
                <th>Date</th>
                <th>Amount (l)</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for record in water_data %}
                <tr>
                    
                    <td>{{ record.date }}</td>
                    <td>{{ record.amount }}</td>
                    <td>
                        <a href="/lifestyle/edit_water/{{ record.id }}"><button>Edit</button></a>
                        <form action="/lifestyle/delete_water/{{ record.id }}" method="POST" style="display:inline;">
                            <button type="submit">Delete</button>
                        </form>
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
